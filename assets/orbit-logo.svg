<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Orbit logo</title>
  <desc id="desc">A bold orbit mark with a central core planet and satellite modules orbiting around it, representing the base module of the Orbit suite.</desc>
  <defs>
    <linearGradient id="orbit-gradient" x1="78" y1="96" x2="434" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#21A8A3"/>
      <stop offset="0.52" stop-color="#3164D4"/>
      <stop offset="1" stop-color="#6D4CC2"/>
    </linearGradient>
    <linearGradient id="panel-gradient" x1="158" y1="126" x2="354" y2="386" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <radialGradient id="core-gradient" cx="38%" cy="36%" r="62%">
      <stop offset="0%" stop-color="#21A8A3"/>
      <stop offset="48%" stop-color="#3164D4"/>
      <stop offset="100%" stop-color="#6D4CC2"/>
    </radialGradient>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3164D4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3164D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#14213D" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#F7FAFC"/>

  <!-- Outer orbit ellipses — bold, this IS the Orbit module -->
  <g fill="none" stroke="url(#orbit-gradient)" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="190" ry="92" stroke-width="22" transform="rotate(-24 256 256)"/>
    <ellipse cx="256" cy="256" rx="190" ry="92" stroke-width="14" opacity="0.28" transform="rotate(36 256 256)"/>
  </g>

  <!-- Accent dots on the outer orbit -->
  <circle cx="406" cy="181" r="28" fill="#21A8A3"/>
  <circle cx="104" cy="323" r="18" fill="#6D4CC2"/>

  <!-- Central panel card -->
  <g filter="url(#soft-shadow)">
    <rect x="156" y="122" width="216" height="268" rx="28" fill="url(#panel-gradient)" stroke="#D9E3F2" stroke-width="4"/>
  </g>

  <!-- Inner orbital rings — three rings at 60° apart represent modules in orbit -->
  <g fill="none" stroke="url(#orbit-gradient)" stroke-linecap="round">
    <ellipse cx="264" cy="256" rx="78" ry="30" stroke-width="2.5" opacity="0.5"/>
    <ellipse cx="264" cy="256" rx="78" ry="30" stroke-width="2.5" opacity="0.35" transform="rotate(60 264 256)"/>
    <ellipse cx="264" cy="256" rx="78" ry="30" stroke-width="2.5" opacity="0.35" transform="rotate(120 264 256)"/>
  </g>

  <!-- Spoke lines from core to each satellite node (hub-and-spoke = foundation) -->
  <line x1="264" y1="256" x2="264" y2="178" stroke="#3164D4" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.45"/>
  <line x1="264" y1="256" x2="333" y2="295" stroke="#21A8A3" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.45"/>
  <line x1="264" y1="256" x2="195" y2="295" stroke="#6D4CC2" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.45"/>

  <!-- Core glow halo -->
  <circle cx="264" cy="256" r="56" fill="url(#core-glow)"/>

  <!-- Central core planet — the base everything orbits around -->
  <circle cx="264" cy="256" r="37" fill="url(#core-gradient)"/>

  <!-- Subtle inner orbit ring on the core itself -->
  <ellipse cx="264" cy="256" rx="37" ry="14" fill="none" stroke="white" stroke-width="2" opacity="0.18" transform="rotate(-20 264 256)"/>

  <!-- Core shine highlight -->
  <circle cx="252" cy="244" r="11" fill="white" opacity="0.22"/>

  <!-- Satellite module nodes — three child modules in orbit -->
  <!-- Top (12 o'clock): teal -->
  <circle cx="264" cy="178" r="10" fill="#21A8A3" stroke="white" stroke-width="2.5"/>

  <!-- Lower-right (~4 o'clock): blue -->
  <circle cx="333" cy="296" r="10" fill="#3164D4" stroke="white" stroke-width="2.5"/>

  <!-- Lower-left (~8 o'clock): purple -->
  <circle cx="195" cy="296" r="10" fill="#6D4CC2" stroke="white" stroke-width="2.5"/>
</svg>
